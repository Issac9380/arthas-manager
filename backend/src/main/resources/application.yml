server:
  port: 8080

spring:
  application:
    name: arthas-manager
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  datasource:
    url: jdbc:sqlite:${user.home}/.arthas-manager/arthas-manager.db
    driver-class-name: org.sqlite.JDBC
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-handlers-package: com.arthasmanager.config
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: arthas-manager-jwt-secret-key-please-change-in-production-env
  expiration: 86400000

arthas:
  # Local directory to cache downloaded JDK / Arthas packages
  tools-dir: ${user.home}/.arthas-manager/tools
  # Full arthas binary distribution URL template — {version} is replaced at runtime
  # Default points to Maven Central (works globally); change to a mirror if needed
  distribution-url: https://repo1.maven.org/maven2/com/taobao/arthas/arthas-packaging/{version}/arthas-packaging-{version}-bin.zip
  # Default Arthas version used when the deploy request does not specify one
  default-arthas-version: 3.7.2
  # Default Arthas HTTP API port inside the container
  default-api-port: 39394
  # Session idle timeout in minutes
  session-timeout: 30

kubernetes:
  # Path to kubeconfig; leave blank to use in-cluster config
  kubeconfig: ${user.home}/.kube/config

logging:
  # 日志文件输出目录（logback-spring.xml 读取此配置）
  file:
    path: logs
  # 控制台编码（防止 Windows 中文乱码）
  charset:
    console: UTF-8
    file: UTF-8
  level:
    com.arthasmanager: DEBUG
    io.fabric8: WARN
  # ──────────────────────────────────────────────────────────────────────────
  # 详细日志模式：启动时追加 --spring.profiles.active=verbose
  # 效果：打印 Spring MVC / Security / MyBatis SQL / Fabric8 / HTTP 请求体
  # 示例：java -jar arthas-manager.jar --spring.profiles.active=verbose
  # ──────────────────────────────────────────────────────────────────────────
