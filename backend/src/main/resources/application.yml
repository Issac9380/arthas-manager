server:
  port: 8080

spring:
  application:
    name: arthas-manager
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

arthas:
  # Local directory to cache downloaded JDK / Arthas packages
  tools-dir: ${user.home}/.arthas-manager/tools
  # Full arthas binary distribution URL template — {version} is replaced at runtime
  # Default points to Maven Central (works globally); change to a mirror if needed
  distribution-url: https://repo1.maven.org/maven2/com/taobao/arthas/arthas-packaging/{version}/arthas-packaging-{version}-bin.zip
  # Default Arthas version used when the deploy request does not specify one
  default-arthas-version: 3.7.2
  # Default Arthas HTTP API port inside the container
  default-api-port: 39394
  # Session idle timeout in minutes
  session-timeout: 30

kubernetes:
  # Path to kubeconfig; leave blank to use in-cluster config
  kubeconfig: ${user.home}/.kube/config

logging:
  level:
    com.arthasmanager: DEBUG
    io.fabric8: WARN
